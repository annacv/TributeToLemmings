<?xml version="1.0" encoding="UTF-8"?>
<svg width="46" height="100" viewBox="0 0 100 220" version="1.1" xmlns="http://www.w3.org/2000/svg">
  <g id="stalactite" stroke="none" fill-rule="evenodd">
    <!-- body: hot red -->
    <path d="M10 0 L90 0 L50 210 Z" fill="#B81E10"/>
    <!-- dark core, right-biased so the lit edge reads on the left -->
    <path d="M44 0 L82 0 L50 196 Z" fill="#7A1408"/>
    <!-- mid sheen -->
    <path d="M30 0 L46 0 L49 150 Z" fill="#E04A28"/>
    <!-- lit left flank -->
    <path d="M10 0 L28 0 L48 168 L50 210 Z" fill="#F06838"/>
    <!-- TELL: bright rim-light sliver down the silhouette's lit edge -->
    <path d="M10 0 L16 0 L50 210 L47 210 Z" fill="#FFC9A0" opacity="0.92"/>
    <!-- cooled stone tip -->
    <ellipse cx="50" cy="206" rx="6" ry="11" fill="#C89078"/>
    <!-- TELL: tip highlight glow -->
    <ellipse cx="49" cy="202" rx="3" ry="5" fill="#FFE6CC" opacity="0.9"/>
  </g>
</svg>
