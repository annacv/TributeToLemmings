  <polygon fill="#070503" points="455,583 492,547 494,555 458,591"/>
  <polygon fill="#070503" points="491,550 505,537 507,545 493,556"/>

  <!-- Right crack -->
  <polygon fill="#070503" points="485,622 524,618 524,626 485,630"/>
  <polygon fill="#070503" points="513,619 534,610 536,618 515,625"/>

  <!-- Bottom-right crack -->
  <polygon fill="#070503" points="468,700 498,738 493,741 462,703"/>

