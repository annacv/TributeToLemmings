<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%" preserveAspectRatio="xMidYMid slice">

  <!-- Sky: deep night, stars -->
  <g id="sky">
    <rect width="800" height="800" fill="#050d05"/>
    <circle cx="80"  cy="60"  r="1.5" fill="#fff" opacity="0.7"/>
    <circle cx="150" cy="120" r="1"   fill="#fff" opacity="0.5"/>
    <circle cx="220" cy="45"  r="2"   fill="#fff" opacity="0.6"/>
    <circle cx="310" cy="90"  r="1.5" fill="#fff" opacity="0.8"/>
    <circle cx="380" cy="30"  r="1"   fill="#fff" opacity="0.4"/>
    <circle cx="430" cy="150" r="1.5" fill="#fff" opacity="0.7"/>
    <circle cx="500" cy="55"  r="1"   fill="#fff" opacity="0.5"/>
    <circle cx="160" cy="200" r="1.5" fill="#fff" opacity="0.4"/>
    <circle cx="260" cy="175" r="1"   fill="#fff" opacity="0.5"/>
    <circle cx="350" cy="190" r="1.5" fill="#fff" opacity="0.6"/>
    <circle cx="100" cy="300" r="1"   fill="#fff" opacity="0.3"/>
    <circle cx="200" cy="280" r="1.5" fill="#fff" opacity="0.4"/>
    <circle cx="70"  cy="390" r="1"   fill="#fff" opacity="0.3"/>
    <circle cx="290" cy="340" r="1.5" fill="#fff" opacity="0.35"/>
    <circle cx="410" cy="260" r="1"   fill="#fff" opacity="0.4"/>
  </g>

  <!-- Midground: floating platform + tree -->
  <g id="midground">
    <!-- Floating platform (left) -->
    <rect x="40"  y="320" width="140" height="18" rx="4" fill="#1a6b10"/>
    <rect x="40"  y="336" width="140" height="8"  rx="2" fill="#0f4208"/>

    <!-- Tree trunk -->
    <rect x="596" y="300" width="42" height="285" rx="6" fill="#6b4a1e"/>
    <rect x="606" y="312" width="10" height="200" rx="3" fill="#7d5a2a" opacity="0.45"/>
    <!-- Root spread -->
    <ellipse cx="582" cy="577" rx="32" ry="12" fill="#5e4018"/>
    <ellipse cx="655" cy="577" rx="27" ry="10" fill="#5e4018"/>

    <!-- Tree foliage — layered blobs, dark-to-bright -->
    <ellipse cx="620" cy="195" rx="115" ry="95"  fill="#164e08"/>
    <ellipse cx="558" cy="230" rx="82"  ry="68"  fill="#1e6010"/>
    <ellipse cx="685" cy="238" rx="76"  ry="62"  fill="#1e6010"/>
    <ellipse cx="622" cy="148" rx="88"  ry="72"  fill="#26760e"/>
    <ellipse cx="578" cy="178" rx="66"  ry="52"  fill="#2e8e10"/>
    <ellipse cx="668" cy="185" rx="62"  ry="50"  fill="#2e8e10"/>
    <ellipse cx="625" cy="124" rx="62"  ry="52"  fill="#38a814"/>
    <!-- Highlight spots -->
    <ellipse cx="598" cy="142" rx="32"  ry="24"  fill="#52cc22" opacity="0.55"/>
    <ellipse cx="652" cy="162" rx="26"  ry="20"  fill="#52cc22" opacity="0.38"/>
    <ellipse cx="625" cy="110" rx="22"  ry="16"  fill="#6ee030" opacity="0.35"/>
  </g>

  <!-- Ground: grass strip + cobblestone path -->
  <g id="ground">
    <!-- Grass band -->
    <rect x="0" y="572" width="800" height="228" fill="#0c3208"/>
    <rect x="0" y="572" width="800" height="28"  fill="#186010"/>
    <!-- Grass tufts -->
    <ellipse cx="50"  cy="572" rx="16" ry="8" fill="#1e7010"/>
    <ellipse cx="130" cy="570" rx="13" ry="6" fill="#1e7010"/>
    <ellipse cx="230" cy="574" rx="18" ry="7" fill="#1e7010"/>
    <ellipse cx="350" cy="571" rx="14" ry="6" fill="#1e7010"/>
    <ellipse cx="460" cy="573" rx="17" ry="7" fill="#1e7010"/>
    <ellipse cx="560" cy="570" rx="13" ry="6" fill="#1e7010"/>
    <ellipse cx="710" cy="572" rx="18" ry="8" fill="#1e7010"/>

    <!-- Cobblestone path -->
    <rect x="0" y="658" width="800" height="142" fill="#28221a"/>
    <!-- Row 1 -->
    <rect x="8"   y="666" width="68" height="36" rx="5" fill="#3a3426"/>
    <rect x="86"  y="668" width="58" height="33" rx="4" fill="#322c20"/>
    <rect x="154" y="663" width="78" height="38" rx="5" fill="#3a3426"/>
    <rect x="242" y="666" width="63" height="35" rx="4" fill="#2c271e"/>
    <rect x="315" y="664" width="73" height="37" rx="5" fill="#3a3426"/>
    <rect x="398" y="667" width="56" height="34" rx="4" fill="#322c20"/>
    <rect x="464" y="663" width="80" height="38" rx="5" fill="#3a3426"/>
    <rect x="554" y="666" width="66" height="35" rx="4" fill="#2c271e"/>
    <rect x="630" y="664" width="72" height="37" rx="5" fill="#322c20"/>
    <rect x="712" y="666" width="80" height="36" rx="4" fill="#3a3426"/>
    <!-- Row 2 -->
    <rect x="18"  y="712" width="53" height="34" rx="4" fill="#322c20"/>
    <rect x="81"  y="715" width="70" height="31" rx="5" fill="#3a3426"/>
    <rect x="161" y="711" width="56" height="35" rx="4" fill="#2c271e"/>
    <rect x="227" y="713" width="76" height="32" rx="5" fill="#3a3426"/>
    <rect x="313" y="712" width="60" height="34" rx="4" fill="#322c20"/>
    <rect x="383" y="714" width="68" height="31" rx="5" fill="#3a3426"/>
    <rect x="461" y="711" width="63" height="35" rx="4" fill="#2c271e"/>
    <rect x="534" y="713" width="78" height="32" rx="5" fill="#3a3426"/>
    <rect x="622" y="712" width="54" height="34" rx="4" fill="#322c20"/>
    <rect x="686" y="714" width="72" height="31" rx="5" fill="#3a3426"/>
  </g>

</svg>
