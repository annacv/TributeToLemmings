<svg width="800" height="2800" viewBox="0 0 800 2800" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Heat rising from the pit mouth: faint at the threshold, furnace at the floor -->
    <radialGradient id="abyss-glow" cx="0.5" cy="1" r="0.9">
      <stop offset="0" stop-color="#F0903A" stop-opacity="0.42"/>
      <stop offset="0.32" stop-color="#E86820" stop-opacity="0.26"/>
      <stop offset="0.62" stop-color="#A8341A" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#2A0E06" stop-opacity="0"/>
    </radialGradient>
    <!-- Ember seam along the stone floor -->
    <linearGradient id="ember-seam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F0A848" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#8A1E0C" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Base void: cool dark up top, warming and reddening toward the Absys floor -->
  <g id="void">
    <rect width="800" height="2800" fill="#070503"/>
    <rect width="800" height="640" fill="#010106"/>
    <rect y="640" width="800" height="700" fill="#020208" opacity="0.7"/>
    <rect y="1240" width="800" height="420" fill="#0D062B" opacity="0.08"/>
    <rect y="1500" width="800" height="620" fill="#1A0A06" opacity="0.55"/>
    <rect y="2040" width="800" height="760" fill="#2A0E06"/>
    <rect y="2360" width="800" height="440" fill="#3A1208" opacity="0.7"/>
  </g>

  <!-- Tunnel mouth: the broken floor shelf the lemming drops through; jagged lip,
       a dark gap dead-center, debris hanging off the torn edge -->
  <g id="tunnel-mouth">
    <rect x="0" y="40" width="800" height="74" fill="#46280E"/>
    <rect x="0" y="40" width="800" height="10" fill="#5E3A16"/>
    <!-- the gap: nothing but fall -->
    <path d="M300 114 L322 60 L352 96 L388 52 L430 100 L470 58 L500 114 Z" fill="#010106"/>
    <path d="M300 114 L500 114 L500 150 L300 150 Z" fill="#010106"/>
    <!-- torn teeth either side of the gap -->
    <path d="M296 114 L284 158 L272 116 Z" fill="#3A2208"/>
    <path d="M504 114 L518 162 L530 118 Z" fill="#3A2208"/>
    <!-- soil clods shaken loose, falling just under the lip -->
    <rect x="250" y="150" width="22" height="14" rx="5" fill="#3A3426" opacity="0.7"/>
    <rect x="430" y="176" width="18" height="12" rx="5" fill="#322C20" opacity="0.6"/>
    <rect x="360" y="206" width="14" height="10" rx="4" fill="#3A3426" opacity="0.45"/>
  </g>

  <!-- Left wall: continuous earth column. Cool brown up top, scorched red-brown as
       it nears the Absys; bumpy inner edge of overlapping rock -->
  <g id="wall-left">
    <rect x="0" width="64" height="2800" fill="#46280E"/>
    <rect x="0" width="32" height="2800" fill="#35200C"/>
    <rect x="0" width="15" height="2800" fill="#28221A"/>
    <!-- upper shaft: neutral earth -->
    <rect x="24" y="60" width="54" height="150" rx="12" fill="#54320F"/>
    <rect x="30" y="196" width="44" height="132" rx="11" fill="#3A2208"/>
    <rect x="22" y="314" width="58" height="158" rx="13" fill="#5E3A16"/>
    <rect x="32" y="458" width="44" height="130" rx="11" fill="#54320F"/>
    <rect x="24" y="574" width="56" height="150" rx="12" fill="#6E4419"/>
    <rect x="32" y="710" width="44" height="128" rx="11" fill="#3A2208"/>
    <rect x="22" y="824" width="58" height="156" rx="13" fill="#5E3A16"/>
    <rect x="32" y="966" width="44" height="128" rx="11" fill="#54320F"/>
    <rect x="24" y="1080" width="56" height="152" rx="12" fill="#6E4419"/>
    <rect x="32" y="1218" width="44" height="126" rx="11" fill="#3A2208"/>
    <!-- warming threshold: red creeps into the brown -->
    <rect x="22" y="1330" width="58" height="156" rx="13" fill="#5A2A10"/>
    <rect x="32" y="1472" width="44" height="128" rx="11" fill="#6A2E12"/>
    <rect x="24" y="1586" width="56" height="152" rx="12" fill="#7A3414"/>
    <rect x="32" y="1724" width="44" height="126" rx="11" fill="#5A2410"/>
    <rect x="22" y="1836" width="58" height="156" rx="13" fill="#7A3414"/>
    <!-- the Absys: scorched ironstone, ember-lit edges -->
    <rect x="24" y="1978" width="56" height="152" rx="12" fill="#8A2E12"/>
    <rect x="32" y="2116" width="44" height="128" rx="11" fill="#5A1006"/>
    <rect x="22" y="2230" width="58" height="156" rx="13" fill="#A8341A"/>
    <rect x="32" y="2372" width="44" height="128" rx="11" fill="#7A1408"/>
    <rect x="24" y="2486" width="56" height="160" rx="12" fill="#8A2E12"/>
    <rect x="32" y="2632" width="44" height="170" rx="11" fill="#5A1006"/>
    <!-- inner-edge shadow notches -->
    <rect x="46" y="420" width="16" height="26" rx="6" fill="#28221A"/>
    <rect x="48" y="900" width="16" height="26" rx="6" fill="#28221A"/>
    <rect x="46" y="1380" width="16" height="26" rx="6" fill="#3A1208"/>
    <rect x="48" y="1880" width="16" height="26" rx="6" fill="#3A1208"/>
    <!-- heat fissures glowing in the lower wall -->
    <rect x="40" y="2080" width="6" height="60" rx="3" fill="#E86820" opacity="0.5"/>
    <rect x="50" y="2300" width="5" height="48" rx="2" fill="#F0903A" opacity="0.45"/>
    <rect x="42" y="2520" width="6" height="66" rx="3" fill="#E86820" opacity="0.55"/>
  </g>

  <!-- Right wall: mirror of the left, offsets staggered so the two don't twin -->
  <g id="wall-right">
    <rect x="736" width="64" height="2800" fill="#46280E"/>
    <rect x="768" width="32" height="2800" fill="#35200C"/>
    <rect x="785" width="15" height="2800" fill="#28221A"/>
    <rect x="722" y="40" width="54" height="146" rx="12" fill="#5E3A16"/>
    <rect x="726" y="172" width="44" height="134" rx="11" fill="#54320F"/>
    <rect x="720" y="292" width="58" height="156" rx="13" fill="#3A2208"/>
    <rect x="726" y="434" width="44" height="130" rx="11" fill="#6E4419"/>
    <rect x="720" y="550" width="56" height="152" rx="12" fill="#54320F"/>
    <rect x="726" y="688" width="44" height="128" rx="11" fill="#5E3A16"/>
    <rect x="720" y="802" width="58" height="156" rx="13" fill="#3A2208"/>
    <rect x="726" y="944" width="44" height="128" rx="11" fill="#6E4419"/>
    <rect x="720" y="1058" width="56" height="152" rx="12" fill="#54320F"/>
    <rect x="726" y="1196" width="44" height="126" rx="11" fill="#5E3A16"/>
    <rect x="720" y="1308" width="58" height="156" rx="13" fill="#6A2E12"/>
    <rect x="726" y="1450" width="44" height="128" rx="11" fill="#5A2A10"/>
    <rect x="720" y="1564" width="56" height="152" rx="12" fill="#7A3414"/>
    <rect x="726" y="1702" width="44" height="126" rx="11" fill="#6A2E12"/>
    <rect x="720" y="1814" width="58" height="156" rx="13" fill="#5A2410"/>
    <rect x="720" y="1956" width="56" height="152" rx="12" fill="#8A2E12"/>
    <rect x="726" y="2094" width="44" height="128" rx="11" fill="#7A1408"/>
    <rect x="720" y="2208" width="58" height="156" rx="13" fill="#A8341A"/>
    <rect x="726" y="2350" width="44" height="128" rx="11" fill="#5A1006"/>
    <rect x="720" y="2464" width="56" height="160" rx="12" fill="#8A2E12"/>
    <rect x="726" y="2610" width="44" height="192" rx="11" fill="#7A1408"/>
    <rect x="738" y="398" width="16" height="26" rx="6" fill="#28221A"/>
    <rect x="736" y="878" width="16" height="26" rx="6" fill="#28221A"/>
    <rect x="738" y="1358" width="16" height="26" rx="6" fill="#3A1208"/>
    <rect x="736" y="1858" width="16" height="26" rx="6" fill="#3A1208"/>
    <rect x="754" y="2120" width="6" height="58" rx="3" fill="#E86820" opacity="0.5"/>
    <rect x="746" y="2330" width="5" height="50" rx="2" fill="#F0903A" opacity="0.45"/>
    <rect x="752" y="2540" width="6" height="64" rx="3" fill="#E86820" opacity="0.55"/>
  </g>

  <!-- Back wall: soil fragments floating in the dark for barely-there depth.
       They cool to embers as the shaft drops -->
  <g id="backwall">
    <rect x="180" y="300" width="76" height="26" rx="8" fill="#3A3426" opacity="0.10"/>
    <rect x="500" y="360" width="60" height="22" rx="7" fill="#322C20" opacity="0.09"/>
    <rect x="300" y="520" width="88" height="28" rx="9" fill="#3A3426" opacity="0.10"/>
    <rect x="560" y="640" width="64" height="22" rx="7" fill="#2C271E" opacity="0.11"/>
    <rect x="200" y="780" width="92" height="30" rx="9" fill="#322C20" opacity="0.09"/>
    <rect x="470" y="900" width="70" height="24" rx="8" fill="#3A3426" opacity="0.10"/>
    <rect x="260" y="1060" width="80" height="26" rx="8" fill="#322C20" opacity="0.09"/>
    <rect x="520" y="1180" width="58" height="20" rx="7" fill="#2C271E" opacity="0.11"/>
    <!-- below the threshold the fragments smoulder -->
    <rect x="240" y="1360" width="84" height="26" rx="8" fill="#5A2410" opacity="0.16"/>
    <rect x="500" y="1500" width="66" height="22" rx="7" fill="#6A2E12" opacity="0.15"/>
    <rect x="300" y="1680" width="78" height="24" rx="8" fill="#7A3414" opacity="0.16"/>
    <rect x="520" y="1820" width="60" height="20" rx="7" fill="#8A2E12" opacity="0.18"/>
  </g>

  <!-- Strata: horizontal soil seams banding the shaft, fading down -->
  <g id="strata">
    <rect y="300" width="800" height="4" fill="#35200C" opacity="0.5"/>
    <rect y="540" width="800" height="4" fill="#35200C" opacity="0.45"/>
    <rect y="820" width="800" height="4" fill="#35200C" opacity="0.42"/>
    <rect y="1100" width="800" height="4" fill="#35200C" opacity="0.4"/>
    <rect y="1380" width="800" height="4" fill="#5A2410" opacity="0.4"/>
    <rect y="1660" width="800" height="4" fill="#6A2E12" opacity="0.38"/>
    <rect y="1900" width="800" height="4" fill="#7A1408" opacity="0.4"/>
  </g>

  <!-- Rust whispers becoming embers: faint up top, glowing near the Absys -->
  <g id="rust">
    <rect x="120" y="380" width="44" height="12" rx="6" fill="#A85A1C" opacity="0.12"/>
    <rect x="640" y="560" width="40" height="12" rx="6" fill="#8A3E10" opacity="0.13"/>
    <rect x="180" y="840" width="48" height="12" rx="6" fill="#A85A1C" opacity="0.15"/>
    <rect x="600" y="1040" width="42" height="12" rx="6" fill="#8A3E10" opacity="0.16"/>
    <rect x="220" y="1300" width="52" height="14" rx="7" fill="#A85A1C" opacity="0.24"/>
    <rect x="560" y="1500" width="46" height="14" rx="7" fill="#C8581C" opacity="0.30"/>
    <rect x="260" y="1740" width="56" height="16" rx="8" fill="#E86820" opacity="0.32"/>
    <rect x="540" y="1940" width="50" height="16" rx="8" fill="#E86820" opacity="0.40"/>
  </g>

  <!-- Ember specks drifting up out of the heat (sparse above, denser below) -->
  <g id="embers">
    <rect x="320" y="1620" width="5" height="5" rx="2" fill="#F0A848" opacity="0.5"/>
    <rect x="470" y="1700" width="4" height="4" rx="2" fill="#E86820" opacity="0.55"/>
    <rect x="250" y="1860" width="6" height="6" rx="3" fill="#F0903A" opacity="0.6"/>
    <rect x="540" y="1920" width="5" height="5" rx="2" fill="#F0A848" opacity="0.6"/>
    <rect x="380" y="2010" width="6" height="6" rx="3" fill="#E86820" opacity="0.7"/>
    <rect x="180" y="2080" width="5" height="5" rx="2" fill="#F0903A" opacity="0.65"/>
    <rect x="620" y="2140" width="6" height="6" rx="3" fill="#F0A848" opacity="0.7"/>
    <rect x="420" y="2230" width="7" height="7" rx="3" fill="#E86820" opacity="0.75"/>
    <rect x="300" y="2330" width="6" height="6" rx="3" fill="#F0903A" opacity="0.8"/>
    <rect x="560" y="2400" width="7" height="7" rx="3" fill="#F0A848" opacity="0.8"/>
  </g>

  <!-- Absys ceiling overhang + red stalactites. The shaft opens into the cavern of
       fire; the teeth hang where the earth ends and the drop turns molten. -->
  <g id="abyss-ceiling">
    <!-- the molten overhang the teeth grow from -->
    <rect x="64" y="2040" width="672" height="56" fill="#8A1E0C"/>
    <rect x="64" y="2040" width="672" height="18" fill="#5A1006"/>
    <rect x="64" y="2086" width="672" height="12" fill="#C8281A" opacity="0.55"/>
    <!-- stalactites: body (hot red), dark core, lit edge, cooled stone tip -->
    <g id="stalactites">
      <!-- 1 -->
      <path d="M40 2096 L96 2096 L66 2330 Z" fill="#B81E10"/>
      <path d="M58 2096 L84 2096 L66 2300 Z" fill="#7A1408"/>
      <path d="M40 2096 L52 2096 L62 2260 L66 2330 Z" fill="#E04A28"/>
      <ellipse cx="66" cy="2332" rx="4" ry="7" fill="#C89078"/>
      <!-- 2 -->
      <path d="M120 2096 L208 2096 L166 2440 Z" fill="#C8281A"/>
      <path d="M142 2096 L190 2096 L166 2400 Z" fill="#8A1E0C"/>
      <path d="M120 2096 L136 2096 L160 2360 L166 2440 Z" fill="#F06838"/>
      <ellipse cx="166" cy="2442" rx="5" ry="9" fill="#C89078"/>
      <!-- 3 (short) -->
      <path d="M232 2096 L292 2096 L262 2270 Z" fill="#B81E10"/>
      <path d="M250 2096 L278 2096 L262 2244 Z" fill="#7A1408"/>
      <path d="M278 2096 L292 2096 L262 2270 Z" fill="#E04A28"/>
      <ellipse cx="262" cy="2272" rx="4" ry="6" fill="#A86850"/>
      <!-- 4 (longest) -->
      <path d="M334 2096 L426 2096 L382 2500 Z" fill="#C8281A"/>
      <path d="M356 2096 L406 2096 L382 2456 Z" fill="#8A1E0C"/>
      <path d="M334 2096 L350 2096 L376 2420 L382 2500 Z" fill="#F06838"/>
      <ellipse cx="382" cy="2502" rx="5" ry="10" fill="#C89078"/>
      <!-- 5 -->
      <path d="M460 2096 L536 2096 L500 2380 Z" fill="#B81E10"/>
      <path d="M480 2096 L520 2096 L500 2344 Z" fill="#7A1408"/>
      <path d="M520 2096 L536 2096 L500 2380 Z" fill="#E04A28"/>
      <ellipse cx="500" cy="2382" rx="4" ry="8" fill="#C89078"/>
      <!-- 6 (short) -->
      <path d="M556 2096 L616 2096 L586 2286 Z" fill="#C8281A"/>
      <path d="M574 2096 L602 2096 L586 2258 Z" fill="#8A1E0C"/>
      <path d="M556 2096 L568 2096 L582 2250 L586 2286 Z" fill="#F06838"/>
      <ellipse cx="586" cy="2288" rx="4" ry="6" fill="#A86850"/>
      <!-- 7 -->
      <path d="M640 2096 L728 2096 L686 2436 Z" fill="#B81E10"/>
      <path d="M662 2096 L710 2096 L686 2396 Z" fill="#7A1408"/>
      <path d="M640 2096 L656 2096 L680 2356 L686 2436 Z" fill="#E04A28"/>
      <ellipse cx="686" cy="2438" rx="5" ry="9" fill="#C89078"/>
      <!-- 8 (short, tucked by the wall) -->
      <path d="M744 2096 L792 2096 L770 2250 Z" fill="#C8281A"/>
      <path d="M756 2096 L784 2096 L770 2226 Z" fill="#8A1E0C"/>
      <ellipse cx="770" cy="2252" rx="4" ry="6" fill="#A86850"/>
    </g>
    <!-- secondary teeth filling the gaps, smaller and dimmer -->
    <g id="stalactites-minor" opacity="0.92">
      <path d="M100 2096 L122 2096 L111 2188 Z" fill="#8A1E0C"/>
      <path d="M308 2096 L330 2096 L319 2200 Z" fill="#8A1E0C"/>
      <path d="M436 2096 L458 2096 L447 2176 Z" fill="#8A1E0C"/>
      <path d="M540 2096 L560 2096 L550 2184 Z" fill="#8A1E0C"/>
      <path d="M620 2096 L640 2096 L630 2170 Z" fill="#8A1E0C"/>
    </g>
  </g>

  <!-- Heat rising from the pit mouth: the warm glow the design calls for, pooling
       at the floor and bleeding up between the teeth -->
  <g id="abyss-heat">
    <rect y="2090" width="800" height="710" fill="url(#abyss-glow)"/>
  </g>

  <!-- The floor of the world: a scorched stone shelf the fall ends on, ember seam
       glowing along the front lip -->
  <g id="abyss-floor">
    <rect y="2690" width="800" height="110" fill="#46280E"/>
    <rect y="2690" width="800" height="110" fill="#3A1208" opacity="0.55"/>
    <!-- speckled stone blocks, like the tunnel floor but heat-darkened -->
    <rect x="12" y="2690" width="74" height="34" rx="6" fill="#5A2A14"/>
    <rect x="94" y="2692" width="60" height="32" rx="5" fill="#4A1810"/>
    <rect x="162" y="2688" width="82" height="36" rx="6" fill="#5A2A14"/>
    <rect x="252" y="2691" width="64" height="33" rx="5" fill="#3A1208"/>
    <rect x="324" y="2689" width="76" height="35" rx="6" fill="#5A2A14"/>
    <rect x="408" y="2692" width="58" height="32" rx="5" fill="#4A1810"/>
    <rect x="474" y="2688" width="86" height="36" rx="6" fill="#5A2A14"/>
    <rect x="568" y="2691" width="66" height="33" rx="5" fill="#3A1208"/>
    <rect x="642" y="2689" width="74" height="35" rx="6" fill="#4A1810"/>
    <rect x="724" y="2691" width="76" height="34" rx="6" fill="#5A2A14"/>
    <!-- glowing cracks between the blocks -->
    <rect x="148" y="2700" width="4" height="80" rx="2" fill="#E86820" opacity="0.6"/>
    <rect x="402" y="2700" width="5" height="86" rx="2" fill="#F0903A" opacity="0.55"/>
    <rect x="636" y="2700" width="4" height="78" rx="2" fill="#E86820" opacity="0.6"/>
    <!-- ember seam along the front lip of the shelf -->
    <rect y="2682" width="800" height="20" fill="url(#ember-seam)"/>
    <!-- a few hot pebbles resting on the shelf -->
    <rect x="220" y="2744" width="22" height="9" rx="4" fill="#7A1408"/>
    <rect x="500" y="2752" width="26" height="10" rx="5" fill="#5A1006"/>
    <rect x="360" y="2748" width="18" height="8" rx="4" fill="#8A2E12"/>
  </g>

  <!-- CRT-bezel breathing room: dark side margins so scanlines never eat the teeth -->
  <g id="vignette">
    <rect width="13" height="2800" fill="#010106" opacity="0.5"/>
    <rect x="787" width="13" height="2800" fill="#010106" opacity="0.5"/>
  </g>
</svg>
