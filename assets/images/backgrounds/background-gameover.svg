<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%" preserveAspectRatio="xMidYMid slice">

  <!-- Sky: near-black backdrop + hanging chain structures -->
  <g id="sky">
    <rect width="800" height="800" fill="#060608"/>

    <!-- Horizontal beam at top -->
    <rect x="40"  y="28" width="720" height="16" rx="3" fill="#28221a"/>
    <rect x="40"  y="28" width="720" height="5"  rx="2" fill="#38301e" opacity="0.7"/>

    <!-- Chain + cross structure 1 (left-center) -->
    <g id="chain-1">
      <!-- Chain links -->
      <ellipse cx="240" cy="58"  rx="7" ry="11" fill="none" stroke="#28221a" stroke-width="4"/>
      <ellipse cx="240" cy="79"  rx="7" ry="11" fill="none" stroke="#28221a" stroke-width="4"/>
      <ellipse cx="240" cy="100" rx="7" ry="11" fill="none" stroke="#28221a" stroke-width="4"/>
      <ellipse cx="240" cy="121" rx="7" ry="11" fill="none" stroke="#28221a" stroke-width="4"/>
      <ellipse cx="240" cy="142" rx="7" ry="11" fill="none" stroke="#28221a" stroke-width="4"/>
      <ellipse cx="240" cy="163" rx="7" ry="11" fill="none" stroke="#28221a" stroke-width="4"/>
      <!-- Cross -->
      <rect x="232" y="178" width="10" height="58" rx="2" fill="#1c1810"/>
      <rect x="216" y="196" width="42" height="10" rx="2" fill="#1c1810"/>
      <!-- Anchor foot -->
      <ellipse cx="240" cy="242" rx="13" ry="7"  fill="#1c1810"/>
      <line x1="227" y1="236" x2="212" y2="256" stroke="#1c1810" stroke-width="4" stroke-linecap="round"/>
      <line x1="253" y1="236" x2="268" y2="256" stroke="#1c1810" stroke-width="4" stroke-linecap="round"/>
    </g>

    <!-- Chain + cross structure 2 (right-center) -->
    <g id="chain-2">
      <ellipse cx="480" cy="58"  rx="7" ry="11" fill="none" stroke="#28221a" stroke-width="4"/>
      <ellipse cx="480" cy="79"  rx="7" ry="11" fill="none" stroke="#28221a" stroke-width="4"/>
      <ellipse cx="480" cy="100" rx="7" ry="11" fill="none" stroke="#28221a" stroke-width="4"/>
      <ellipse cx="480" cy="121" rx="7" ry="11" fill="none" stroke="#28221a" stroke-width="4"/>
      <ellipse cx="480" cy="142" rx="7" ry="11" fill="none" stroke="#28221a" stroke-width="4"/>
      <ellipse cx="480" cy="163" rx="7" ry="11" fill="none" stroke="#28221a" stroke-width="4"/>
      <!-- Cross -->
      <rect x="472" y="178" width="10" height="58" rx="2" fill="#1c1810"/>
      <rect x="456" y="196" width="42" height="10" rx="2" fill="#1c1810"/>
      <!-- Anchor foot -->
      <ellipse cx="480" cy="242" rx="13" ry="7"  fill="#1c1810"/>
      <line x1="467" y1="236" x2="452" y2="256" stroke="#1c1810" stroke-width="4" stroke-linecap="round"/>
      <line x1="493" y1="236" x2="508" y2="256" stroke="#1c1810" stroke-width="4" stroke-linecap="round"/>
    </g>

    <!-- Short chain far right (partially visible) -->
    <g id="chain-3" opacity="0.5">
      <ellipse cx="680" cy="58"  rx="7" ry="11" fill="none" stroke="#28221a" stroke-width="4"/>
      <ellipse cx="680" cy="79"  rx="7" ry="11" fill="none" stroke="#28221a" stroke-width="4"/>
      <ellipse cx="680" cy="100" rx="7" ry="11" fill="none" stroke="#28221a" stroke-width="4"/>
      <rect x="672" y="116" width="10" height="44" rx="2" fill="#1c1810"/>
      <rect x="658" y="130" width="36" height="10" rx="2" fill="#1c1810"/>
    </g>
  </g>

  <!-- Midground: atmospheric haze layers -->
  <g id="midground">
    <ellipse cx="400" cy="500" rx="420" ry="90" fill="#0a0e08" opacity="0.55"/>
    <ellipse cx="160" cy="480" rx="180" ry="60" fill="#0c1008" opacity="0.4"/>
    <ellipse cx="650" cy="490" rx="160" ry="55" fill="#0c1008" opacity="0.35"/>
  </g>

  <!-- Ground: mossy rock pile + cross marker + dark earth -->
  <g id="ground">
    <!-- Dark earth -->
    <rect x="0" y="580" width="800" height="220" fill="#080c06"/>
    <!-- Ground surface -->
    <rect x="0" y="580" width="800" height="18" fill="#0e1e0a" opacity="0.9"/>

    <!-- Rock pile (left) -->
    <ellipse cx="140" cy="578" rx="130" ry="58" fill="#18160e"/>
    <ellipse cx="95"  cy="560" rx="54"  ry="30" fill="#201e12"/>
    <ellipse cx="162" cy="554" rx="65"  ry="34" fill="#1c1a10"/>
    <ellipse cx="70"  cy="562" rx="36"  ry="22" fill="#26221a"/>
    <ellipse cx="195" cy="558" rx="44"  ry="24" fill="#201e12"/>
    <ellipse cx="220" cy="572" rx="30"  ry="18" fill="#18160e"/>
    <!-- Moss on rocks -->
    <ellipse cx="105" cy="552" rx="30"  ry="13" fill="#14300e" opacity="0.65"/>
    <ellipse cx="172" cy="546" rx="24"  ry="11" fill="#14300e" opacity="0.55"/>
    <ellipse cx="80"  cy="558" rx="18"  ry="8"  fill="#14300e" opacity="0.5"/>

    <!-- Grave cross marker -->
    <rect x="122" y="466" width="10" height="86" rx="2" fill="#252018"/>
    <rect x="104" y="486" width="46" height="10" rx="2" fill="#252018"/>

    <!-- Scattered small rocks (right side) -->
    <ellipse cx="680" cy="590" rx="28" ry="14" fill="#14120c"/>
    <ellipse cx="730" cy="584" rx="18" ry="10" fill="#181610"/>
    <ellipse cx="660" cy="598" rx="14" ry="8"  fill="#14120c"/>

    <!-- Grass / moss tufts at ground level -->
    <ellipse cx="50"  cy="580" rx="20" ry="8" fill="#122808" opacity="0.75"/>
    <ellipse cx="310" cy="582" rx="15" ry="6" fill="#122808" opacity="0.6"/>
    <ellipse cx="520" cy="578" rx="17" ry="7" fill="#122808" opacity="0.65"/>
    <ellipse cx="750" cy="581" rx="22" ry="8" fill="#122808" opacity="0.6"/>
  </g>

</svg>
